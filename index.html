<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tıklix — Ücretsiz Mobil Oyunlar: Tıkla, Oyna, Rekor Kır!</title>
<meta name="description" content="Tıklix'te onlarca ücretsiz mobil oyun: refleks, bulmaca, hafıza ve arcade. İndirme yok, kayıt yok — tıkla ve hemen oyna!">
<meta name="keywords" content="ücretsiz oyun, mobil oyun, tarayıcı oyunu, refleks oyunu, bulmaca, html5 oyun, tıklix">
<meta name="robots" content="index,follow">
<meta name="author" content="Tıklix">
<meta name="theme-color" content="#0B0E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tıklix">
<meta name="mobile-web-app-capable" content="yes">
<link rel="canonical" href="https://tiklix.com/">
<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Tıklix">
<meta property="og:title" content="Tıklix — Tıkla, Oyna, Rekor Kır!">
<meta property="og:description" content="Onlarca ücretsiz mobil oyun. İndirme yok, kayıt yok — hemen oyna!">
<meta property="og:url" content="https://tiklix.com/">
<meta property="og:locale" content="tr_TR">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236C5CFF'/%3E%3Cstop offset='1' stop-color='%2300C6FF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='1' y='1' width='30' height='30' rx='9' fill='url(%23g)'/%3E%3Ccircle cx='16' cy='16' r='5' fill='white'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='white' stroke-width='2' opacity='.55'/%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/theme.css">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebSite","name":"Tıklix","url":"https://tiklix.com/","description":"Ücretsiz mobil tarayıcı oyunları","inLanguage":"tr"}
</script>
<style>
/* --- Hero --- */
.hero{max-width:var(--maxw);margin:0 auto;padding:44px 18px 8px;text-align:center}
.hero h1{margin:0 0 12px;font-size:clamp(30px,6vw,52px);font-weight:800;letter-spacing:-1.2px;line-height:1.1}
.hero h1 b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{margin:0 auto;max-width:520px;color:var(--text-dim);font-size:clamp(15px,2.5vw,17px)}
.hero-stats{display:flex;justify-content:center;gap:10px;margin-top:22px;flex-wrap:wrap}
.stat{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:999px;
  background:var(--bg-elev);border:1px solid var(--hair);font-size:13.5px;font-weight:600;color:var(--text-dim)}
.stat b{color:var(--text)}

/* --- Kategoriler + arama --- */
.toolbar{max-width:var(--maxw);margin:0 auto;padding:26px 18px 4px;display:flex;flex-direction:column;gap:14px}
.search{position:relative;max-width:440px;width:100%;margin:0 auto}
.search input{width:100%;padding:13px 18px 13px 46px;border-radius:999px;border:1px solid var(--hair);
  background:var(--bg-elev);color:var(--text);font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search input::placeholder{color:var(--text-faint)}
.search svg{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--text-faint);pointer-events:none}
.cats{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 8px;scrollbar-width:none;justify-content:safe center}
.cats::-webkit-scrollbar{display:none}

/* --- Oyun ızgarası --- */
.grid{max-width:var(--maxw);margin:0 auto;padding:14px 18px 40px;display:grid;gap:16px;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
@media(min-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}}
.game-card{position:relative;display:flex;flex-direction:column;border-radius:var(--r);overflow:hidden;
  background:var(--bg-elev);border:1px solid var(--hair);box-shadow:var(--shadow);
  transition:transform .18s,box-shadow .18s,border-color .18s;-webkit-tap-highlight-color:transparent}
.game-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--hair-strong)}
.game-card:active{transform:scale(.97)}
.game-art{aspect-ratio:16/11;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative}
.game-art::after{content:"";position:absolute;inset:0;background:radial-gradient(320px 140px at 50% 120%,rgba(255,255,255,.22),transparent 70%)}
.game-body{padding:13px 15px 15px;display:flex;flex-direction:column;gap:5px;flex:1}
.game-title{font-weight:800;font-size:16px;letter-spacing:-.2px}
.game-desc{font-size:12.8px;color:var(--text-dim);line-height:1.45;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.game-meta{margin-top:auto;padding-top:10px;display:flex;align-items:center;justify-content:space-between}
.game-cat{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint)}
.play-pill{font-size:12.5px;font-weight:800;color:#fff;background:var(--grad);padding:6px 15px;border-radius:999px}
.badge-new{position:absolute;top:10px;right:10px;z-index:1;font-size:10.5px;font-weight:800;letter-spacing:.6px;
  background:var(--grad-hot);color:#fff;padding:4px 10px;border-radius:999px;box-shadow:0 3px 10px rgba(255,77,141,.4)}
.soon-card{opacity:.55;pointer-events:none}
.soon-card .game-art{background:var(--bg-sunken);font-size:40px;filter:grayscale(.4)}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty span{font-size:44px;display:block;margin-bottom:12px}

/* --- Footer --- */
footer{border-top:1px solid var(--hair);padding:28px 18px 40px;text-align:center;color:var(--text-faint);font-size:13px}
footer .logo{justify-content:center;margin-bottom:8px;font-size:16px}
</style>
</head>
<body>

<header class="bar">
  <div class="bar-in">
    <a class="logo" href="./" aria-label="Tıklix ana sayfa">
      <svg width="28" height="28" viewBox="0 0 32 32" aria-hidden="true">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#6C5CFF"/><stop offset="1" stop-color="#00C6FF"/>
        </linearGradient></defs>
        <rect x="1" y="1" width="30" height="30" rx="9" fill="url(#lg)"/>
        <circle cx="16" cy="16" r="5" fill="#fff"/>
        <circle cx="16" cy="16" r="9" fill="none" stroke="#fff" stroke-width="2" opacity=".55"/>
      </svg>
      <span>Tıkl<b>ix</b></span>
    </a>
    <div style="flex:1"></div>
    <button class="icon-btn" id="themeBtn" aria-label="Tema değiştir" title="Tema değiştir">
      <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </div>
</header>

<section class="hero">
  <h1>Tıkla. Oyna.<br><b>Rekor kır!</b></h1>
  <p>İndirme yok, kayıt yok. Telefonunda anında açılan ücretsiz mini oyunlar — her hafta yenileri geliyor.</p>
  <div class="hero-stats">
    <span class="stat">🎮 <b id="gameCount">1</b> oyun</span>
    <span class="stat">⚡ Anında oyna</span>
    <span class="stat">📱 Mobil uyumlu</span>
  </div>
</section>

<div class="toolbar">
  <div class="search">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="searchInput" type="search" placeholder="Oyun ara…" autocomplete="off">
  </div>
  <div class="cats" id="cats" role="tablist" aria-label="Kategoriler"></div>
</div>

<main class="grid" id="grid" aria-live="polite"></main>

<footer>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 32 32" aria-hidden="true">
      <rect x="1" y="1" width="30" height="30" rx="9" fill="url(#lg)"/>
      <circle cx="16" cy="16" r="5" fill="#fff"/>
    </svg>
    <span>Tıkl<b>ix</b></span>
  </div>
  <div>© <span id="year"></span> Tıklix — Tüm oyunlar tarayıcında çalışır, ücretsizdir.</div>
</footer>

<script src="games/data.js"></script>
<script>
(function(){
  "use strict";
  var GAMES = window.TIKLIX_GAMES || [];
  var CATS = window.TIKLIX_CATEGORIES || [];
  var state = { cat: "hepsi", q: "" };

  /* --- Tema --- */
  var root = document.documentElement;
  var saved = null;
  try { saved = localStorage.getItem("tiklix-theme"); } catch(e){}
  if (saved) root.setAttribute("data-theme", saved);
  document.getElementById("themeBtn").addEventListener("click", function(){
    var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next);
    try { localStorage.setItem("tiklix-theme", next); } catch(e){}
  });

  /* --- Kategoriler --- */
  var catsEl = document.getElementById("cats");
  CATS.forEach(function(c){
    var b = document.createElement("button");
    b.className = "chip" + (c.id === state.cat ? " on" : "");
    b.setAttribute("role","tab");
    b.dataset.cat = c.id;
    b.textContent = c.emoji + " " + c.label;
    b.addEventListener("click", function(){
      state.cat = c.id;
      catsEl.querySelectorAll(".chip").forEach(function(x){ x.classList.toggle("on", x.dataset.cat === c.id); });
      render();
    });
    catsEl.appendChild(b);
  });

  /* --- Arama --- */
  document.getElementById("searchInput").addEventListener("input", function(e){
    state.q = e.target.value.trim().toLocaleLowerCase("tr");
    render();
  });

  /* --- Izgara --- */
  var grid = document.getElementById("grid");
  function render(){
    var list = GAMES.filter(function(g){
      if (state.cat !== "hepsi" && g.category !== state.cat) return false;
      if (state.q && (g.title + " " + g.desc).toLocaleLowerCase("tr").indexOf(state.q) === -1) return false;
      return true;
    });
    grid.innerHTML = "";
    list.forEach(function(g){
      var a = document.createElement("a");
      a.className = "game-card";
      a.href = "games/" + g.id + "/";
      a.innerHTML =
        (g.isNew ? '<span class="badge-new">YENİ</span>' : "") +
        '<div class="game-art" style="background:' + g.gradient + '">' + g.emoji + '</div>' +
        '<div class="game-body">' +
          '<div class="game-title"></div>' +
          '<div class="game-desc"></div>' +
          '<div class="game-meta"><span class="game-cat"></span><span class="play-pill">OYNA</span></div>' +
        '</div>';
      a.querySelector(".game-title").textContent = g.title;
      a.querySelector(".game-desc").textContent = g.desc;
      var cat = CATS.find(function(c){ return c.id === g.category; });
      a.querySelector(".game-cat").textContent = cat ? cat.label : g.category;
      grid.appendChild(a);
    });
    if (!state.q && state.cat === "hepsi") {
      var soon = document.createElement("div");
      soon.className = "game-card soon-card";
      soon.innerHTML =
        '<div class="game-art">🔒</div>' +
        '<div class="game-body">' +
          '<div class="game-title">Çok yakında…</div>' +
          '<div class="game-desc">Yeni oyunlar yolda! Her hafta yenisi ekleniyor.</div>' +
          '<div class="game-meta"><span class="game-cat">Yakında</span></div>' +
        '</div>';
      grid.appendChild(soon);
    }
    if (!list.length && (state.q || state.cat !== "hepsi")) {
      grid.innerHTML = '<div class="empty"><span>🔍</span>Aradığın oyun bulunamadı.<br>Farklı bir kategori veya kelime dene.</div>';
    }
  }

  document.getElementById("gameCount").textContent = GAMES.length;
  document.getElementById("year").textContent = new Date().getFullYear();
  render();
})();
</script>
</body>
</html>
