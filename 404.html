<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sayfa bulunamadı — Tıklix</title>
<meta name="robots" content="noindex">
<!-- 404 her yoldan sunulur; göreli bağlantılar güvenilmez olduğundan
     stiller satır içi, ana sayfa bağlantısı JS ile hesaplanır. -->
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#0C0D12;color:#EDEEF3;text-align:center;padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.box{max-width:380px}
h1{font-size:25px;font-weight:700;letter-spacing:-.5px;margin:0 0 8px}
p{color:#8E93A3;margin:0 0 24px;line-height:1.6}
a{display:inline-flex;align-items:center;justify-content:center;
  font-weight:600;font-size:14.5px;padding:12px 26px;border-radius:12px;
  background:#5B67F5;color:#fff;text-decoration:none}
.code{font-size:60px;font-weight:700;letter-spacing:-3px;line-height:1;
  color:#5B67F5;margin-bottom:14px}
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <h1>Sayfa bulunamadı</h1>
  <p>Aradığın oyun taşınmış ya da hiç var olmamış olabilir.</p>
  <a id="home" href="/">Oyunlara dön</a>
</div>
<script>
/* Proje sayfası (kullanici.github.io/repo/) alt yolunda da doğru çalışsın */
var seg = location.pathname.split("/")[1];
document.getElementById("home").href = seg && location.hostname.endsWith("github.io") ? "/" + seg + "/" : "/";
</script>
</body>
</html>
