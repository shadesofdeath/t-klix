<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Renk Farkı — Tıklix</title>
<meta name="description" content="Farklı renkteki kareyi süre dolmadan bul! Her seviyede ızgara büyür, renk farkı azalır. Refleksini test et, rekor kır.">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#0B0E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="canonical" href="https://tiklix.com/games/renk-farki/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Tıklix">
<meta property="og:title" content="Renk Farkı — Tıklix">
<meta property="og:description" content="Farklı renkteki kareyi bul! Refleksini test et, rekor kır.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236C5CFF'/%3E%3Cstop offset='1' stop-color='%2300C6FF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='1' y='1' width='30' height='30' rx='9' fill='url(%23g)'/%3E%3Ccircle cx='16' cy='16' r='5' fill='white'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='white' stroke-width='2' opacity='.55'/%3E%3C/svg%3E">
<link rel="stylesheet" href="../../assets/theme.css">
<style>
html,body{height:100%}
body{display:flex;flex-direction:column;touch-action:manipulation;overscroll-behavior:none}

.game-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;max-width:560px;width:100%;margin:0 auto}
.back{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:14px;color:var(--text-dim);
  padding:8px 14px 8px 10px;border-radius:999px;background:var(--bg-elev);border:1px solid var(--hair);
  -webkit-tap-highlight-color:transparent}
.back:active{transform:scale(.95)}

.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  width:100%;max-width:560px;margin:0 auto;padding:0 16px 24px;gap:14px}

/* --- HUD --- */
.hud{display:flex;width:100%;gap:10px}
.hud-box{flex:1;text-align:center;padding:10px 6px;border-radius:var(--r-sm);
  background:var(--bg-elev);border:1px solid var(--hair)}
.hud-label{font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint)}
.hud-val{font-size:22px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.hud-val.combo-hot{color:var(--gold)}
.hearts{letter-spacing:0;font-size:13px;white-space:nowrap;line-height:22px}

/* --- Zaman çubuğu --- */
.timebar{width:100%;height:10px;border-radius:999px;background:var(--bg-sunken);overflow:hidden;border:1px solid var(--hair)}
.timebar i{display:block;height:100%;width:100%;border-radius:999px;background:var(--grad);transform-origin:left;
  transition:background .2s}
.timebar i.low{background:var(--grad-hot)}

/* --- Izgara --- */
.board-wrap{width:100%;aspect-ratio:1;position:relative}
.board{position:absolute;inset:0;display:grid;gap:8px}
.tile{border:none;border-radius:16%;cursor:pointer;padding:0;
  transition:transform .1s;-webkit-tap-highlight-color:transparent;
  box-shadow:inset 0 -3px 6px rgba(0,0,0,.12),inset 0 2px 4px rgba(255,255,255,.14)}
.tile:active{transform:scale(.93)}
.tile.correct{animation:pop .35s ease}
.tile.wrong{animation:shake .3s ease}
@keyframes pop{40%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes shake{20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.board.reveal .tile:not(.odd){opacity:.25}

/* --- Ekranlar (başlangıç / oyun sonu) --- */
.overlay{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;text-align:center;border-radius:var(--r);
  background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--hair);padding:24px;animation:fadein .3s ease}
@keyframes fadein{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.overlay .big-emoji{font-size:56px;line-height:1}
.overlay h1{margin:0;font-size:clamp(24px,6vw,34px);font-weight:800;letter-spacing:-.8px}
.overlay h1 b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.overlay p{margin:0;color:var(--text-dim);font-size:14.5px;max-width:320px;line-height:1.55}
.best-tag{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:999px;
  background:var(--gold-soft);color:var(--gold);font-weight:800;font-size:14px}
.final-score{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.new-record{animation:pulse 1s ease infinite}
@keyframes pulse{50%{transform:scale(1.06)}}
.overlay-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* --- Seviye bildirimi --- */
.level-toast{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:6;
  background:var(--accent);color:#fff;font-weight:800;font-size:14px;padding:8px 20px;
  border-radius:999px;box-shadow:0 6px 20px rgba(108,92,255,.5);opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s}
.level-toast.show{opacity:1;transform:translateX(-50%) translateY(4px)}

/* --- Skor uçuşu --- */
.fly{position:absolute;z-index:7;font-weight:800;font-size:20px;color:var(--mint);pointer-events:none;
  animation:flyup .7s ease forwards;text-shadow:0 2px 8px rgba(0,0,0,.4)}
@keyframes flyup{to{transform:translateY(-46px);opacity:0}}
</style>
</head>
<body>

<div class="game-bar">
  <a class="back" href="../../">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Tıklix
  </a>
  <div style="flex:1"></div>
  <button class="icon-btn" id="soundBtn" aria-label="Sesi aç/kapat">🔊</button>
</div>

<div class="stage">
  <div class="hud">
    <div class="hud-box"><div class="hud-label">Skor</div><div class="hud-val" id="score">0</div></div>
    <div class="hud-box"><div class="hud-label">Seviye</div><div class="hud-val" id="level">1</div></div>
    <div class="hud-box"><div class="hud-label">Kombo</div><div class="hud-val" id="combo">×1</div></div>
    <div class="hud-box"><div class="hud-label">Can</div><div class="hud-val hearts" id="hearts">❤️❤️❤️</div></div>
  </div>

  <div class="timebar" aria-hidden="true"><i id="timefill"></i></div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="level-toast" id="toast"></div>

    <div class="overlay" id="startScreen">
      <div class="big-emoji">🎨</div>
      <h1>Renk <b>Farkı</b></h1>
      <p>Farklı renkteki kareyi süre dolmadan tıkla! Her seviyede ızgara büyür, renk farkı azalır. 3 canın var — hazır mısın?</p>
      <div class="best-tag" id="bestStart">🏆 Rekor: 0</div>
      <button class="btn btn-primary" id="startBtn" style="font-size:17px;padding:15px 40px">▶ Başla</button>
    </div>

    <div class="overlay hidden" id="endScreen">
      <div class="big-emoji" id="endEmoji">🏁</div>
      <h1 id="endTitle">Oyun bitti!</h1>
      <div class="final-score" id="finalScore">0</div>
      <div class="best-tag" id="bestEnd">🏆 Rekor: 0</div>
      <p id="endMsg"></p>
      <div class="overlay-btns">
        <button class="btn btn-primary" id="retryBtn">↻ Tekrar oyna</button>
        <button class="btn btn-ghost" id="shareBtn">Paylaş</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

/* ---------- Durum ---------- */
var S = {
  playing:false, level:1, score:0, combo:1, lives:3,
  oddIndex:-1, roundTime:0, timeLeft:0, raf:0, lastTs:0,
  best: 0, muted: false
};
try { S.best = parseInt(localStorage.getItem("tiklix-rf-best") || "0", 10) || 0; } catch(e){}
try { S.muted = localStorage.getItem("tiklix-rf-muted") === "1"; } catch(e){}

var $ = function(id){ return document.getElementById(id); };
var board = $("board"), timefill = $("timefill");

/* ---------- Ses (WebAudio, dosya yok) ---------- */
var actx = null;
function beep(freq, dur, type, vol){
  if (S.muted) return;
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") actx.resume();
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(vol || .15, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch(e){}
}
function sfxCorrect(){ beep(660,.12,"sine",.14); setTimeout(function(){ beep(880,.14,"sine",.12); }, 70); }
function sfxWrong(){ beep(160,.25,"sawtooth",.12); }
function sfxLevel(){ [523,659,784].forEach(function(f,i){ setTimeout(function(){ beep(f,.13,"triangle",.13); }, i*80); }); }
function sfxOver(){ [440,330,220].forEach(function(f,i){ setTimeout(function(){ beep(f,.2,"sine",.12); }, i*140); }); }
function buzz(ms){ if (navigator.vibrate) try{ navigator.vibrate(ms); }catch(e){} }

var soundBtn = $("soundBtn");
function syncSound(){ soundBtn.textContent = S.muted ? "🔇" : "🔊"; }
soundBtn.addEventListener("click", function(){
  S.muted = !S.muted;
  try{ localStorage.setItem("tiklix-rf-muted", S.muted ? "1" : "0"); }catch(e){}
  syncSound();
});
syncSound();

/* ---------- Seviye ayarları ---------- */
function gridSize(lv){          /* 2x2 → 6x6 */
  if (lv < 3) return 2;
  if (lv < 6) return 3;
  if (lv < 10) return 4;
  if (lv < 16) return 5;
  return 6;
}
function colorDelta(lv){        /* açıklık farkı: %26 → %5 */
  return Math.max(26 - lv * 1.1, 5);
}
function roundSeconds(lv){      /* tur süresi: 3.5sn → 1.6sn */
  return Math.max(3.5 - lv * .07, 1.6);
}

/* ---------- HUD ---------- */
function syncHud(){
  $("score").textContent = S.score;
  $("level").textContent = S.level;
  var c = $("combo");
  c.textContent = "×" + S.combo;
  c.classList.toggle("combo-hot", S.combo >= 4);
  $("hearts").textContent = "❤️".repeat(S.lives) + "🖤".repeat(3 - S.lives);
}

/* ---------- Tur kurulumu ---------- */
function newRound(){
  var n = gridSize(S.level);
  var total = n * n;
  S.oddIndex = Math.floor(Math.random() * total);

  var hue = Math.floor(Math.random() * 360);
  var sat = 62 + Math.floor(Math.random() * 24);
  var light = 42 + Math.floor(Math.random() * 18);
  var delta = colorDelta(S.level) * (Math.random() < .5 ? -1 : 1);
  var oddLight = Math.min(88, Math.max(12, light + delta));
  var base = "hsl(" + hue + "," + sat + "%," + light + "%)";
  var odd  = "hsl(" + hue + "," + sat + "%," + oddLight + "%)";

  board.classList.remove("reveal");
  board.style.gridTemplateColumns = "repeat(" + n + ",1fr)";
  board.innerHTML = "";
  for (var i = 0; i < total; i++){
    var t = document.createElement("button");
    t.className = "tile" + (i === S.oddIndex ? " odd" : "");
    t.style.background = i === S.oddIndex ? odd : base;
    t.dataset.i = i;
    board.appendChild(t);
  }

  S.roundTime = roundSeconds(S.level);
  S.timeLeft = S.roundTime;
  S.lastTs = 0;
  cancelAnimationFrame(S.raf);
  S.raf = requestAnimationFrame(tick);
}

/* ---------- Zamanlayıcı ---------- */
function tick(ts){
  if (!S.playing) return;
  if (!S.lastTs) S.lastTs = ts;
  var dt = (ts - S.lastTs) / 1000;
  S.lastTs = ts;
  if (!document.hidden) S.timeLeft -= dt;

  var ratio = Math.max(S.timeLeft / S.roundTime, 0);
  timefill.style.transform = "scaleX(" + ratio + ")";
  timefill.classList.toggle("low", ratio < .35);

  if (S.timeLeft <= 0){ loseLife(true); return; }
  S.raf = requestAnimationFrame(tick);
}

/* ---------- Etkileşim ---------- */
board.addEventListener("pointerdown", function(e){
  if (!S.playing) return;
  var t = e.target.closest(".tile");
  if (!t) return;
  if (+t.dataset.i === S.oddIndex) onCorrect(t); else onWrong(t);
});

function onCorrect(tile){
  cancelAnimationFrame(S.raf);
  tile.classList.add("correct");
  sfxCorrect(); buzz(20);

  var timeBonus = Math.round((S.timeLeft / S.roundTime) * 10);
  var gained = (10 + timeBonus) * S.combo;
  S.score += gained;
  S.combo = Math.min(S.combo + 1, 9);
  flyScore(tile, "+" + gained);

  var prevSize = gridSize(S.level);
  S.level++;
  if (gridSize(S.level) !== prevSize){
    toast("Seviye " + S.level + " — ızgara büyüdü! 🔥");
    sfxLevel();
  }
  syncHud();
  setTimeout(newRound, 260);
}

function onWrong(tile){
  tile.classList.add("wrong");
  sfxWrong(); buzz([40,40,40]);
  S.combo = 1;
  loseLife(false);
}

function loseLife(timedOut){
  cancelAnimationFrame(S.raf);
  S.lives--;
  if (timedOut){ S.combo = 1; sfxWrong(); buzz(80); }
  syncHud();
  if (S.lives <= 0){ gameOver(); return; }
  /* doğru kareyi kısa süreliğine göster, sonra yeni tur */
  board.classList.add("reveal");
  toast(timedOut ? "Süre doldu! ⏰" : "Yanlış kare! 💔");
  setTimeout(newRound, 800);
}

/* ---------- Görsel geri bildirim ---------- */
var toastTimer = 0;
function toast(msg){
  var el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove("show"); }, 1100);
}
function flyScore(tile, text){
  var wrap = board.parentElement;
  var r = tile.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
  var f = document.createElement("span");
  f.className = "fly";
  f.textContent = text;
  f.style.left = (r.left - wr.left + r.width/2 - 18) + "px";
  f.style.top = (r.top - wr.top) + "px";
  wrap.appendChild(f);
  setTimeout(function(){ f.remove(); }, 700);
}

/* ---------- Oyun akışı ---------- */
function start(){
  S.playing = true; S.level = 1; S.score = 0; S.combo = 1; S.lives = 3;
  $("startScreen").classList.add("hidden");
  $("endScreen").classList.add("hidden");
  syncHud();
  newRound();
}

function gameOver(){
  S.playing = false;
  cancelAnimationFrame(S.raf);
  sfxOver(); buzz([60,60,120]);
  board.classList.add("reveal");

  var isRecord = S.score > S.best;
  if (isRecord){
    S.best = S.score;
    try{ localStorage.setItem("tiklix-rf-best", String(S.best)); }catch(e){}
  }
  $("finalScore").textContent = S.score;
  $("finalScore").classList.toggle("new-record", isRecord);
  $("bestEnd").textContent = "🏆 Rekor: " + S.best;
  $("endEmoji").textContent = isRecord ? "🎉" : (S.score >= 200 ? "😎" : "🏁");
  $("endTitle").innerHTML = isRecord ? "Yeni <b>rekor!</b>" : "Oyun bitti!";
  $("endMsg").textContent = "Seviye " + S.level + "'e ulaştın." +
    (isRecord ? " Muhteşemsin! 🚀" : " Rekoru kırmak için tekrar dene!");
  $("endScreen").classList.remove("hidden");
}

$("bestStart").textContent = "🏆 Rekor: " + S.best;
$("startBtn").addEventListener("click", start);
$("retryBtn").addEventListener("click", start);

$("shareBtn").addEventListener("click", function(){
  var text = "Renk Farkı'nda " + S.score + " puan yaptım! Sen de dene 🎨 " + location.href;
  if (navigator.share){
    navigator.share({ title: "Tıklix — Renk Farkı", text: text }).catch(function(){});
  } else if (navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){ toast("Panoya kopyalandı! 📋"); });
  }
});
})();
</script>
</body>
</html>
