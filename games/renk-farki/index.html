<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Renk Farkı — Tıklix</title>
<meta name="description" content="Tonu farklı kareyi süre dolmadan bul. Her seviyede ızgara büyür, renk farkı azalır. Refleksini test et, rekorunu geliştir.">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#0C0D12">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="canonical" href="https://tiklix.com/games/renk-farki/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Tıklix">
<meta property="og:title" content="Renk Farkı — Tıklix">
<meta property="og:description" content="Tonu farklı kareyi süre dolmadan bul. Refleksini test et, rekorunu geliştir.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='1' y='1' width='30' height='30' rx='8' fill='%235B67F5'/%3E%3Ccircle cx='16' cy='16' r='4.5' fill='white'/%3E%3Ccircle cx='16' cy='16' r='8.5' fill='none' stroke='white' stroke-width='2' opacity='.5'/%3E%3C/svg%3E">
<link rel="stylesheet" href="../../assets/theme.css">
<link rel="stylesheet" href="game.css">
</head>
<body>

<div class="game-bar">
  <a class="icon-btn" href="../../" aria-label="Tıklix ana sayfaya dön" title="Ana sayfa">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </a>
  <div class="game-name">
    <span class="eyebrow">Refleks</span>
    <b>Renk Farkı</b>
  </div>
  <button class="icon-btn" id="soundBtn" aria-label="Sesi aç/kapat">
    <svg id="soundOn" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9.5 9.5 0 0 1 0 13"/></svg>
    <svg id="soundOff" class="hidden" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="m16 9 6 6m0-6-6 6"/></svg>
  </button>
</div>

<div class="stage">
  <div class="hud card">
    <div class="hud-box"><span class="eyebrow">Skor</span><b class="num" id="score">0</b></div>
    <div class="hud-sep"></div>
    <div class="hud-box"><span class="eyebrow">Seviye</span><b class="num" id="level">1</b></div>
    <div class="hud-sep"></div>
    <div class="hud-box"><span class="eyebrow">Kombo</span><b class="num" id="combo">×1</b></div>
    <div class="hud-sep"></div>
    <div class="hud-box"><span class="eyebrow">Can</span><span class="lives" id="lives"></span></div>
  </div>

  <div class="timebar" aria-hidden="true"><i id="timefill"></i></div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="level-toast" id="toast"></div>

    <div class="overlay" id="startScreen">
      <span class="eyebrow">Refleks · Orta · ~2 dk</span>
      <h1>Renk Farkı</h1>
      <p>Tonu farklı kareyi süre dolmadan seç. Her seviyede ızgara büyür, fark azalır. Üç hakkın var.</p>
      <div class="best-tag num" id="bestStart">Rekor · 0</div>
      <button class="btn btn-primary btn-big" id="startBtn">Oyuna başla</button>
    </div>

    <div class="overlay hidden" id="endScreen">
      <span class="eyebrow" id="endTitle">Oyun bitti</span>
      <div class="final-score num" id="finalScore">0</div>
      <p id="endMsg"></p>
      <div class="best-tag num" id="bestEnd">Rekor · 0</div>
      <div class="overlay-btns">
        <button class="btn btn-primary btn-big" id="retryBtn">Tekrar oyna</button>
        <button class="btn btn-ghost btn-big" id="shareBtn">Paylaş</button>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/core.js"></script>
<script src="game.js"></script>
</body>
</html>
